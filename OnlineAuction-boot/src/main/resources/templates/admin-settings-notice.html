<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞拍公告管理 - 在线拍卖系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        }
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 24px;
            font-weight: 500;
            color: #303133;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app" class="page-container">
        <h1 class="page-title">竞拍公告管理</h1>
        <el-card shadow="never">
            <div style="padding: 20px;">
                <div style="margin-bottom: 20px;">
                    <el-button type="primary" @click="handleAdd">发布公告</el-button>
                </div>
                <el-table :data="tableData" border style="width: 100%;">
                    <el-table-column prop="id" label="ID" width="80"></el-table-column>
                    <el-table-column prop="noticeTitle" label="公告标题" width="200"></el-table-column>
                    <el-table-column prop="isTop" label="是否置顶" width="100">
                        <template slot-scope="scope">
                            <el-tag v-if="scope.row.isTop === 1" type="warning">置顶</el-tag>
                            <span v-else>否</span>
                        </template>
                    </el-table-column>
                    <el-table-column prop="noticeStatus" label="状态" width="100">
                        <template slot-scope="scope">
                            <el-tag v-if="scope.row.noticeStatus === 1" type="success">已发布</el-tag>
                            <el-tag v-else-if="scope.row.noticeStatus === 0" type="info">未发布</el-tag>
                            <el-tag v-else type="danger">已下架</el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column prop="publishTime" label="发布时间" width="180"></el-table-column>
                    <el-table-column label="操作" width="250">
                        <template slot-scope="scope">
                            <el-button size="mini" @click="handleEdit(scope.row)">编辑</el-button>
                            <el-button size="mini" type="success" @click="handlePublish(scope.row)">发布</el-button>
                            <el-button size="mini" type="danger" @click="handleDelete(scope.row)">删除</el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>
        </el-card>
    </div>
    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script>
        new Vue({
            el: '#app',
            data() {
                return {
                    tableData: [
                        { id: 1, noticeTitle: '系统维护通知', isTop: 1, noticeStatus: 1, publishTime: '2025-12-31 10:00:00' },
                        { id: 2, noticeTitle: '拍卖规则更新', isTop: 0, noticeStatus: 1, publishTime: '2025-12-30 15:00:00' }
                    ]
                }
            },
            methods: {
                handleAdd() {
                    this.$message.info('发布公告功能待实现');
                },
                handleEdit(row) {
                    this.$message.info('编辑功能待实现：' + row.noticeTitle);
                },
                handlePublish(row) {
                    this.$message.info('发布功能待实现：' + row.noticeTitle);
                },
                handleDelete(row) {
                    this.$confirm('确定要删除这个公告吗？', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    }).then(() => {
                        this.$message.success('删除成功');
                    }).catch(() => {});
                }
            }
        });
    </script>
</body>
</html>

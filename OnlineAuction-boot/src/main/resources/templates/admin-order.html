<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞拍订单管理 - 在线拍卖系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        }
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 24px;
            font-weight: 500;
            color: #303133;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app" class="page-container">
        <h1 class="page-title">竞拍订单管理</h1>
        <el-card shadow="never">
            <div style="padding: 20px;">
                <el-form :inline="true" class="demo-form-inline" style="margin-bottom: 20px;">
                    <el-form-item label="订单状态">
                        <el-select v-model="searchForm.orderStatus" placeholder="请选择状态" clearable>
                            <el-option label="待付款" value="0"></el-option>
                            <el-option label="待发货" value="1"></el-option>
                            <el-option label="待收货" value="2"></el-option>
                            <el-option label="已完成" value="3"></el-option>
                            <el-option label="已悔拍" value="4"></el-option>
                        </el-select>
                    </el-form-item>
                    <el-form-item label="订单号">
                        <el-input v-model="searchForm.orderNo" placeholder="请输入订单号" clearable></el-input>
                    </el-form-item>
                    <el-form-item>
                        <el-button type="primary" @click="handleSearch">查询</el-button>
                        <el-button @click="handleReset">重置</el-button>
                    </el-form-item>
                </el-form>
                
                <el-table :data="tableData" border style="width: 100%;">
                    <el-table-column prop="orderNo" label="订单号" width="180"></el-table-column>
                    <el-table-column prop="goodsName" label="商品名称" width="200"></el-table-column>
                    <el-table-column prop="buyerName" label="买方" width="150"></el-table-column>
                    <el-table-column prop="dealPrice" label="成交价" width="120"></el-table-column>
                    <el-table-column prop="orderStatus" label="状态" width="120">
                        <template slot-scope="scope">
                            <el-tag v-if="scope.row.orderStatus === 0" type="warning">待付款</el-tag>
                            <el-tag v-else-if="scope.row.orderStatus === 1" type="info">待发货</el-tag>
                            <el-tag v-else-if="scope.row.orderStatus === 2" type="primary">待收货</el-tag>
                            <el-tag v-else-if="scope.row.orderStatus === 3" type="success">已完成</el-tag>
                            <el-tag v-else-if="scope.row.orderStatus === 4" type="danger">已悔拍</el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column prop="createTime" label="创建时间" width="180"></el-table-column>
                    <el-table-column label="操作" width="200">
                        <template slot-scope="scope">
                            <el-button size="mini" @click="handleView(scope.row)">查看</el-button>
                            <el-button size="mini" type="primary" @click="handleStatus(scope.row)">状态管理</el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>
        </el-card>
    </div>
    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script>
        new Vue({
            el: '#app',
            data() {
                return {
                    searchForm: {
                        orderStatus: '',
                        orderNo: ''
                    },
                    tableData: [
                        { orderNo: '20251231001', goodsName: '古董花瓶', buyerName: 'buyer001', dealPrice: 1500, orderStatus: 0, createTime: '2025-12-31 10:00:00' },
                        { orderNo: '20251230001', goodsName: '名画', buyerName: 'buyer002', dealPrice: 5000, orderStatus: 1, createTime: '2025-12-30 15:00:00' }
                    ]
                }
            },
            methods: {
                handleSearch() {
                    this.$message.info('查询功能待实现');
                },
                handleReset() {
                    this.searchForm = {
                        orderStatus: '',
                        orderNo: ''
                    };
                },
                handleView(row) {
                    this.$message.info('查看功能待实现：' + row.orderNo);
                },
                handleStatus(row) {
                    this.$message.info('状态管理功能待实现：' + row.orderNo);
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户账号管理 - 在线拍卖系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        }
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 24px;
            font-weight: 500;
            color: #303133;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app" class="page-container">
        <h1 class="page-title">用户账号管理</h1>
        <el-card shadow="never">
            <div style="padding: 20px;">
                <el-form :inline="true" class="demo-form-inline">
                    <el-form-item label="用户名">
                        <el-input v-model="searchForm.userName" placeholder="请输入用户名" clearable></el-input>
                    </el-form-item>
                    <el-form-item label="角色">
                        <el-select v-model="searchForm.role" placeholder="请选择角色" clearable>
                            <el-option label="买方用户" value="1"></el-option>
                            <el-option label="卖方用户" value="2"></el-option>
                            <el-option label="管理员" value="3"></el-option>
                        </el-select>
                    </el-form-item>
                    <el-form-item>
                        <el-button type="primary" @click="handleSearch">查询</el-button>
                        <el-button @click="handleReset">重置</el-button>
                    </el-form-item>
                </el-form>
                
                <el-table :data="tableData" border style="width: 100%; margin-top: 20px;">
                    <el-table-column prop="id" label="ID" width="80"></el-table-column>
                    <el-table-column prop="userName" label="用户名" width="150"></el-table-column>
                    <el-table-column prop="realName" label="真实姓名" width="120"></el-table-column>
                    <el-table-column prop="phone" label="手机号" width="130"></el-table-column>
                    <el-table-column prop="userRole" label="角色" width="100">
                        <template slot-scope="scope">
                            <span v-if="scope.row.userRole === 1">买方用户</span>
                            <span v-else-if="scope.row.userRole === 2">卖方用户</span>
                            <span v-else-if="scope.row.userRole === 3">管理员</span>
                        </template>
                    </el-table-column>
                    <el-table-column prop="userStatus" label="状态" width="100">
                        <template slot-scope="scope">
                            <el-tag v-if="scope.row.userStatus === 0" type="success">正常</el-tag>
                            <el-tag v-else type="danger">禁用</el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column label="操作" width="200">
                        <template slot-scope="scope">
                            <el-button size="mini" @click="handleEdit(scope.row)">编辑</el-button>
                            <el-button 
                                size="mini" 
                                :type="scope.row.userStatus === 0 ? 'warning' : 'success'"
                                @click="handleStatus(scope.row)"
                            >
                                {{ scope.row.userStatus === 0 ? '禁用' : '启用' }}
                            </el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>
        </el-card>
    </div>
    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script>
        new Vue({
            el: '#app',
            data() {
                return {
                    searchForm: {
                        userName: '',
                        role: ''
                    },
                    tableData: []
                }
            },
            mounted() {
                this.loadData();
            },
            methods: {
                loadData() {
                    // 这里应该调用后端API获取数据
                    this.tableData = [
                        { id: 1, userName: 'buyer001', realName: '张三', phone: '13800138000', userRole: 1, userStatus: 0 },
                        { id: 2, userName: 'seller001', realName: '李四', phone: '13800138001', userRole: 2, userStatus: 0 },
                        { id: 3, userName: 'admin', realName: '管理员', phone: '13800138002', userRole: 3, userStatus: 0 }
                    ];
                },
                handleSearch() {
                    this.$message.info('查询功能待实现');
                },
                handleReset() {
                    this.searchForm = {
                        userName: '',
                        role: ''
                    };
                },
                handleEdit(row) {
                    this.$message.info('编辑功能待实现：' + row.userName);
                },
                handleStatus(row) {
                    this.$message.info('状态修改功能待实现：' + row.userName);
                }
            }
        });
    </script>
</body>
</html>

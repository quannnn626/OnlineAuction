<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板管理 - 在线拍卖系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        }
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 24px;
            font-weight: 500;
            color: #303133;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app" class="page-container">
        <h1 class="page-title">留言板管理</h1>
        <el-card shadow="never">
            <div style="padding: 20px;">
                <el-table :data="tableData" border style="width: 100%;">
                    <el-table-column prop="id" label="ID" width="80"></el-table-column>
                    <el-table-column prop="userName" label="用户" width="150"></el-table-column>
                    <el-table-column prop="goodsName" label="关联商品" width="200"></el-table-column>
                    <el-table-column prop="messageContent" label="留言内容" width="300"></el-table-column>
                    <el-table-column prop="messageStatus" label="状态" width="100">
                        <template slot-scope="scope">
                            <el-tag v-if="scope.row.messageStatus === 0" type="warning">未回复</el-tag>
                            <el-tag v-else type="success">已回复</el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column prop="createTime" label="留言时间" width="180"></el-table-column>
                    <el-table-column label="操作" width="200">
                        <template slot-scope="scope">
                            <el-button size="mini" @click="handleReply(scope.row)">回复</el-button>
                            <el-button size="mini" type="danger" @click="handleDelete(scope.row)">删除</el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>
        </el-card>
    </div>
    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script>
        new Vue({
            el: '#app',
            data() {
                return {
                    tableData: [
                        { id: 1, userName: 'buyer001', goodsName: '古董花瓶', messageContent: '这个商品什么时候开始竞拍？', messageStatus: 0, createTime: '2025-12-31 10:00:00' },
                        { id: 2, userName: 'buyer002', goodsName: '名画', messageContent: '商品有瑕疵吗？', messageStatus: 1, createTime: '2025-12-30 15:00:00' }
                    ]
                }
            },
            methods: {
                handleReply(row) {
                    this.$prompt('请输入回复内容', '回复留言', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        inputType: 'textarea'
                    }).then(({ value }) => {
                        this.$message.success('回复成功');
                    }).catch(() => {});
                },
                handleDelete(row) {
                    this.$confirm('确定要删除这条留言吗？', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    }).then(() => {
                        this.$message.success('删除成功');
                    }).catch(() => {});
                }
            }
        });
    </script>
</body>
</html>

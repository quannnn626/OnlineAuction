<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - 在线拍卖系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        }
        .page-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 24px;
            font-weight: 500;
            color: #303133;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app" class="page-container">
        <h1 class="page-title">消息中心</h1>
        <el-card shadow="never">
            <div style="padding: 20px;">
                <el-tabs v-model="activeTab">
                    <el-tab-pane label="竞拍提醒" name="bid">
                        <el-table :data="bidMessages" border style="width: 100%; margin-top: 20px;">
                            <el-table-column prop="title" label="标题" width="200"></el-table-column>
                            <el-table-column prop="content" label="内容"></el-table-column>
                            <el-table-column prop="createTime" label="时间" width="180"></el-table-column>
                            <el-table-column label="操作" width="100">
                                <template slot-scope="scope">
                                    <el-button size="mini" @click="handleRead(scope.row)">已读</el-button>
                                </template>
                            </el-table-column>
                        </el-table>
                    </el-tab-pane>
                    <el-tab-pane label="订单通知" name="order">
                        <el-table :data="orderMessages" border style="width: 100%; margin-top: 20px;">
                            <el-table-column prop="title" label="标题" width="200"></el-table-column>
                            <el-table-column prop="content" label="内容"></el-table-column>
                            <el-table-column prop="createTime" label="时间" width="180"></el-table-column>
                        </el-table>
                    </el-tab-pane>
                    <el-tab-pane label="系统公告" name="system">
                        <el-table :data="systemMessages" border style="width: 100%; margin-top: 20px;">
                            <el-table-column prop="title" label="标题" width="200"></el-table-column>
                            <el-table-column prop="content" label="内容"></el-table-column>
                            <el-table-column prop="createTime" label="时间" width="180"></el-table-column>
                        </el-table>
                    </el-tab-pane>
                </el-tabs>
            </div>
        </el-card>
    </div>
    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script>
        new Vue({
            el: '#app',
            data() {
                return {
                    activeTab: 'bid',
                    bidMessages: [
                        { title: '竞拍提醒', content: '您关注的商品"古董花瓶"即将开始竞拍', createTime: '2025-12-31 10:00:00' }
                    ],
                    orderMessages: [
                        { title: '订单通知', content: '您的订单20251231001已发货', createTime: '2025-12-31 09:00:00' }
                    ],
                    systemMessages: [
                        { title: '系统公告', content: '系统维护通知', createTime: '2025-12-30 15:00:00' }
                    ]
                }
            },
            methods: {
                handleRead(row) {
                    this.$message.success('已标记为已读');
                }
            }
        });
    </script>
</body>
</html>

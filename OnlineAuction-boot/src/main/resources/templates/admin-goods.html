<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拍卖商品管理 - 在线拍卖系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        }
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 24px;
            font-weight: 500;
            color: #303133;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app" class="page-container">
        <h1 class="page-title">拍卖商品管理</h1>
        <el-card shadow="never">
            <div style="padding: 20px;">
                <el-tabs v-model="activeTab" @tab-click="handleTabClick">
                    <el-tab-pane label="待审核" name="pending">
                        <el-table :data="pendingData" border style="width: 100%; margin-top: 20px;">
                            <el-table-column prop="id" label="商品ID" width="100"></el-table-column>
                            <el-table-column prop="goodsName" label="商品名称" width="200"></el-table-column>
                            <el-table-column prop="sellerName" label="卖方" width="150"></el-table-column>
                            <el-table-column prop="basePrice" label="起拍价" width="120"></el-table-column>
                            <el-table-column label="操作" width="200">
                                <template slot-scope="scope">
                                    <el-button size="mini" type="success" @click="handleAudit(scope.row, 1)">通过</el-button>
                                    <el-button size="mini" type="danger" @click="handleAudit(scope.row, 2)">驳回</el-button>
                                </template>
                            </el-table-column>
                        </el-table>
                    </el-tab-pane>
                    <el-tab-pane label="已审核" name="audited">
                        <el-table :data="auditedData" border style="width: 100%; margin-top: 20px;">
                            <el-table-column prop="id" label="商品ID" width="100"></el-table-column>
                            <el-table-column prop="goodsName" label="商品名称" width="200"></el-table-column>
                            <el-table-column prop="goodsStatus" label="状态" width="120">
                                <template slot-scope="scope">
                                    <el-tag v-if="scope.row.goodsStatus === 0" type="info">未开始</el-tag>
                                    <el-tag v-else-if="scope.row.goodsStatus === 1" type="success">竞拍中</el-tag>
                                    <el-tag v-else-if="scope.row.goodsStatus === 2" type="warning">已成交</el-tag>
                                    <el-tag v-else type="danger">已流拍</el-tag>
                                </template>
                            </el-table-column>
                            <el-table-column label="操作" width="150">
                                <template slot-scope="scope">
                                    <el-button size="mini" @click="handleView(scope.row)">查看</el-button>
                                    <el-button size="mini" type="warning" @click="handleOffline(scope.row)">下架</el-button>
                                </template>
                            </el-table-column>
                        </el-table>
                    </el-tab-pane>
                </el-tabs>
            </div>
        </el-card>
    </div>
    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script>
        new Vue({
            el: '#app',
            data() {
                return {
                    activeTab: 'pending',
                    pendingData: [
                        { id: 1, goodsName: '古董花瓶', sellerName: 'seller001', basePrice: 1000 },
                        { id: 2, goodsName: '名画', sellerName: 'seller002', basePrice: 5000 }
                    ],
                    auditedData: [
                        { id: 3, goodsName: '手表', goodsStatus: 1 },
                        { id: 4, goodsName: '珠宝', goodsStatus: 2 }
                    ]
                }
            },
            methods: {
                handleTabClick(tab) {
                    this.$message.info('切换到：' + tab.label);
                },
                handleAudit(row, status) {
                    this.$message.info('审核功能待实现：' + row.goodsName + '，状态：' + (status === 1 ? '通过' : '驳回'));
                },
                handleView(row) {
                    this.$message.info('查看功能待实现：' + row.goodsName);
                },
                handleOffline(row) {
                    this.$message.info('下架功能待实现：' + row.goodsName);
                }
            }
        });
    </script>
</body>
</html>

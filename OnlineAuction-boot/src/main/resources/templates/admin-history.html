<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史竞拍管理 - 在线拍卖系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        }
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 24px;
            font-weight: 500;
            color: #303133;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app" class="page-container">
        <h1 class="page-title">历史竞拍管理</h1>
        <el-card shadow="never">
            <div style="padding: 20px;">
                <el-form :inline="true" class="demo-form-inline" style="margin-bottom: 20px;">
                    <el-form-item label="订单号">
                        <el-input v-model="searchForm.orderNo" placeholder="请输入订单号" clearable></el-input>
                    </el-form-item>
                    <el-form-item label="用户">
                        <el-input v-model="searchForm.userName" placeholder="请输入用户名" clearable></el-input>
                    </el-form-item>
                    <el-form-item label="时间范围">
                        <el-date-picker
                            v-model="searchForm.dateRange"
                            type="daterange"
                            range-separator="至"
                            start-placeholder="开始日期"
                            end-placeholder="结束日期">
                        </el-date-picker>
                    </el-form-item>
                    <el-form-item>
                        <el-button type="primary" @click="handleSearch">查询</el-button>
                        <el-button @click="handleReset">重置</el-button>
                        <el-button type="success" @click="handleExport">导出报表</el-button>
                    </el-form-item>
                </el-form>
                
                <el-table :data="tableData" border style="width: 100%;">
                    <el-table-column prop="orderNo" label="订单号" width="180"></el-table-column>
                    <el-table-column prop="goodsName" label="商品名称" width="200"></el-table-column>
                    <el-table-column prop="buyerName" label="买方" width="150"></el-table-column>
                    <el-table-column prop="dealPrice" label="成交价" width="120"></el-table-column>
                    <el-table-column prop="orderStatus" label="状态" width="120">
                        <template slot-scope="scope">
                            <el-tag v-if="scope.row.orderStatus === 3" type="success">已完成</el-tag>
                            <el-tag v-else-if="scope.row.orderStatus === 4" type="danger">已悔拍</el-tag>
                            <el-tag v-else-if="scope.row.orderStatus === 5" type="info">已退款</el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column prop="createTime" label="成交时间" width="180"></el-table-column>
                    <el-table-column label="操作" width="200">
                        <template slot-scope="scope">
                            <el-button size="mini" @click="handleView(scope.row)">查看</el-button>
                            <el-button size="mini" type="warning" @click="handleAudit(scope.row)">审核</el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>
        </el-card>
    </div>
    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script>
        new Vue({
            el: '#app',
            data() {
                return {
                    searchForm: {
                        orderNo: '',
                        userName: '',
                        dateRange: []
                    },
                    tableData: [
                        { orderNo: '20251230001', goodsName: '古董花瓶', buyerName: 'buyer001', dealPrice: 1500, orderStatus: 3, createTime: '2025-12-30 10:00:00' },
                        { orderNo: '20251229001', goodsName: '名画', buyerName: 'buyer002', dealPrice: 5000, orderStatus: 4, createTime: '2025-12-29 15:00:00' }
                    ]
                }
            },
            methods: {
                handleSearch() {
                    this.$message.info('查询功能待实现');
                },
                handleReset() {
                    this.searchForm = {
                        orderNo: '',
                        userName: '',
                        dateRange: []
                    };
                },
                handleExport() {
                    this.$message.info('导出功能待实现');
                },
                handleView(row) {
                    this.$message.info('查看功能待实现：' + row.orderNo);
                },
                handleAudit(row) {
                    this.$message.info('审核功能待实现：' + row.orderNo);
                }
            }
        });
    </script>
</body>
</html>

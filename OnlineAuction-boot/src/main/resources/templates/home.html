<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户首页 - 在线拍卖系统</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/element-ui/lib/theme-chalk/index.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Helvetica Neue", Helvetica, "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        background-color: #f5f7fa;
      }
      #app {
        min-height: 100vh;
      }
      .page-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      /* 顶部搜索区域 */
      .search-section {
        background: #fff;
        padding: 30px 40px;
        margin-bottom: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
      }
      .search-wrapper {
        max-width: 800px;
        margin: 0 auto;
      }

      /* 轮播图区域 */
      .banner-section {
        margin-bottom: 30px;
      }
      .banner-carousel {
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
      }
      .banner-item {
        height: 400px;
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 24px;
        cursor: pointer;
      }
      .banner-item:hover {
        opacity: 0.9;
      }

      /* 商品类别区域 */
      .category-section {
        background: #fff;
        padding: 30px;
        margin-bottom: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
      }
      .category-title {
        font-size: 20px;
        font-weight: 500;
        color: #303133;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 2px solid #409eff;
      }
      .category-list {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
      }
      .category-item {
        flex: 0 0 auto;
        padding: 12px 24px;
        background: #f5f7fa;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.3s;
        border: 2px solid transparent;
      }
      .category-item:hover {
        background: #ecf5ff;
        border-color: #409eff;
        color: #409eff;
      }
      .category-item.active {
        background: #409eff;
        color: #fff;
      }

      /* 热门商品区域 */
      .goods-section {
        background: #fff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
      }
      .goods-title {
        font-size: 20px;
        font-weight: 500;
        color: #303133;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 2px solid #409eff;
      }
      .goods-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
      }
      .goods-item {
        border: 1px solid #ebeef5;
        border-radius: 8px;
        overflow: hidden;
        transition: all 0.3s;
        cursor: pointer;
        background: #fff;
      }
      .goods-item:hover {
        box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.15);
        transform: translateY(-2px);
      }
      .goods-item-content {
        display: flex;
        padding: 15px;
      }
      .goods-item-info {
        flex: 1;
        min-width: 0;
        padding-right: 15px;
      }
      .goods-item-title {
        font-size: 16px;
        font-weight: 500;
        color: #303133;
        margin-bottom: 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .goods-item-desc {
        font-size: 13px;
        color: #909399;
        line-height: 1.6;
        margin-bottom: 10px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .goods-item-price {
        font-size: 18px;
        font-weight: 600;
        color: #f56c6c;
      }
      .goods-item-price-label {
        font-size: 12px;
        color: #909399;
        margin-right: 5px;
      }
      .goods-item-image {
        flex-shrink: 0;
        width: 100px;
        height: 100px;
        border-radius: 6px;
        overflow: hidden;
        background: #f5f7fa;
      }
      .goods-item-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .goods-item-footer {
        padding: 10px 15px;
        background: #f5f7fa;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        color: #909399;
      }
      .goods-status {
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
      }
      .goods-status-auctioning {
        background: #f0f9ff;
        color: #409eff;
      }
      .goods-status-upcoming {
        background: #fef0f0;
        color: #f56c6c;
      }
      .goods-status-ended {
        background: #f5f7fa;
        color: #909399;
      }
    </style>
  </head>
  <body>
    <div id="app" class="page-container">
      <!-- 顶部搜索区域 -->
      <div class="search-section">
        <div class="search-wrapper">
          <el-input
            v-model="searchKeyword"
            placeholder="请输入商品名称、关键词搜索"
            size="large"
            @keyup.enter.native="handleSearch"
          >
            <el-button
              slot="append"
              icon="el-icon-search"
              @click="handleSearch"
            ></el-button>
          </el-input>
        </div>
      </div>

      <!-- 轮播图区域 -->
      <div class="banner-section">
        <el-carousel
          :interval="4000"
          type="card"
          height="400px"
          class="banner-carousel"
          indicator-position="outside"
        >
          <el-carousel-item
            v-for="(banner, index) in bannerList"
            :key="index"
            @click.native="handleBannerClick(banner)"
          >
            <div
              class="banner-item"
              :style="{ backgroundImage: 'url(' + (banner.bannerImg || 'https://via.placeholder.com/1200x400?text=Banner' + (index + 1)) + ')' }"
            >
              <div
                style="
                  text-align: center;
                  background: rgba(0, 0, 0, 0.3);
                  padding: 20px;
                  border-radius: 8px;
                "
              >
                <h2 style="margin: 0 0 10px 0">
                  {{ banner.goodsName || '轮播图 ' + (index + 1) }}
                </h2>
                <p style="margin: 0; font-size: 16px">点击查看详情</p>
              </div>
            </div>
          </el-carousel-item>
        </el-carousel>
      </div>

      <!-- 商品类别区域 -->
      <div class="category-section">
        <div class="category-title"><i class="el-icon-menu"></i> 商品分类</div>
        <div class="category-list">
          <div
            class="category-item"
            :class="{ active: selectedCategoryId === 0 }"
            @click="handleCategoryClick(0)"
          >
            全部
          </div>
          <div
            v-for="category in categoryList"
            :key="category.id"
            class="category-item"
            :class="{ active: selectedCategoryId === category.id }"
            @click="handleCategoryClick(category.id)"
          >
            {{ category.categoryName }}
          </div>
        </div>
      </div>

      <!-- 热门商品列表区域 -->
      <div class="goods-section">
        <div class="goods-title"><i class="el-icon-star-on"></i> 热门商品</div>
        <div class="goods-list" v-if="goodsList.length > 0">
          <div
            v-for="goods in goodsList"
            :key="goods.id"
            class="goods-item"
            @click="handleGoodsClick(goods)"
          >
            <div class="goods-item-content">
              <div class="goods-item-info">
                <div class="goods-item-title">{{ goods.goodsName }}</div>
                <div class="goods-item-desc">
                  {{ goods.goodsDesc || '暂无描述' }}
                </div>
                <div class="goods-item-price">
                  <span class="goods-item-price-label">起拍价：</span>
                  ¥{{ goods.basePrice }}
                </div>
              </div>
              <div class="goods-item-image">
                <img
                  :src="getGoodsImage(goods.goodsImg)"
                  :alt="goods.goodsName"
                  onerror="this.src='https://via.placeholder.com/100x100?text=No+Image'"
                />
              </div>
            </div>
            <div class="goods-item-footer">
              <span>
                <i class="el-icon-time"></i>
                {{ formatTime(goods.startTime) }} - {{ formatTime(goods.endTime)
                }}
              </span>
              <span
                class="goods-status"
                :class="getGoodsStatusClass(goods.goodsStatus)"
              >
                {{ getGoodsStatusText(goods.goodsStatus) }}
              </span>
            </div>
          </div>
        </div>
        <el-empty v-else description="暂无商品数据"></el-empty>
      </div>
    </div>

    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script>
      new Vue({
        el: "#app",
        data() {
          return {
            searchKeyword: "",
            bannerList: [
              {
                id: 1,
                bannerImg: "https://via.placeholder.com/1200x400?text=Banner1",
                goodsId: 1,
                goodsName: "精品古董花瓶",
              },
              {
                id: 2,
                bannerImg: "https://via.placeholder.com/1200x400?text=Banner2",
                goodsId: 2,
                goodsName: "限量版名表",
              },
              {
                id: 3,
                bannerImg: "https://via.placeholder.com/1200x400?text=Banner3",
                goodsId: 3,
                goodsName: "名家字画",
              },
            ],
            categoryList: [
              { id: 1, categoryName: "奢侈品" },
              { id: 2, categoryName: "房产" },
              { id: 3, categoryName: "艺术品" },
              { id: 4, categoryName: "珠宝首饰" },
              { id: 5, categoryName: "汽车" },
              { id: 6, categoryName: "其他" },
            ],
            selectedCategoryId: 0,
            goodsList: [
              {
                id: 1,
                goodsName: "清代青花瓷花瓶",
                goodsDesc:
                  "清代乾隆年间青花瓷花瓶，保存完好，具有很高的收藏价值。瓶身绘有精美的花鸟图案，工艺精湛。",
                goodsImg: "https://via.placeholder.com/300x300?text=商品1",
                basePrice: 50000.0,
                startTime: "2025-01-01 10:00:00",
                endTime: "2025-01-05 18:00:00",
                goodsStatus: 1,
              },
              {
                id: 2,
                goodsName: "劳力士潜航者系列腕表",
                goodsDesc:
                  "劳力士潜航者系列经典款，全新未使用，原装包装齐全。防水深度300米，适合潜水爱好者。",
                goodsImg: "https://via.placeholder.com/300x300?text=商品2",
                basePrice: 80000.0,
                startTime: "2025-01-02 14:00:00",
                endTime: "2025-01-06 20:00:00",
                goodsStatus: 1,
              },
              {
                id: 3,
                goodsName: "齐白石花鸟画作",
                goodsDesc:
                  "齐白石晚年花鸟画作，真迹，附有鉴定证书。画面生动，色彩鲜艳，是收藏投资的绝佳选择。",
                goodsImg: "https://via.placeholder.com/300x300?text=商品3",
                basePrice: 200000.0,
                startTime: "2025-01-03 09:00:00",
                endTime: "2025-01-07 17:00:00",
                goodsStatus: 0,
              },
              {
                id: 4,
                goodsName: "钻石戒指",
                goodsDesc:
                  "1克拉钻石戒指，GIA认证，18K白金戒托，设计精美，适合求婚或纪念日礼物。",
                goodsImg: "https://via.placeholder.com/300x300?text=商品4",
                basePrice: 30000.0,
                startTime: "2025-01-04 11:00:00",
                endTime: "2025-01-08 19:00:00",
                goodsStatus: 1,
              },
              {
                id: 5,
                goodsName: "保时捷911跑车",
                goodsDesc:
                  "2018年保时捷911 Carrera，行驶里程3万公里，车况良好，无重大事故。",
                goodsImg: "https://via.placeholder.com/300x300?text=商品5",
                basePrice: 800000.0,
                startTime: "2025-01-05 10:00:00",
                endTime: "2025-01-09 18:00:00",
                goodsStatus: 0,
              },
              {
                id: 6,
                goodsName: "明代紫砂壶",
                goodsDesc:
                  "明代制壶名家作品，紫砂材质，包浆自然，具有很高的艺术价值和收藏价值。",
                goodsImg: "https://via.placeholder.com/300x300?text=商品6",
                basePrice: 15000.0,
                startTime: "2025-01-06 13:00:00",
                endTime: "2025-01-10 21:00:00",
                goodsStatus: 1,
              },
            ],
          };
        },
        mounted() {
          // 这里可以加载真实数据
          // this.loadBanners();
          // this.loadCategories();
          // this.loadGoods();
        },
        methods: {
          // 搜索功能（暂时不做）
          handleSearch() {
            if (!this.searchKeyword.trim()) {
              this.$message.warning("请输入搜索关键词");
              return;
            }
            this.$message.info("搜索功能开发中...");
          },
          // 轮播图点击
          handleBannerClick(banner) {
            if (banner.goodsId) {
              // 跳转到商品详情页，传递商品ID
              window.location.href = "/page/goods-detail?id=" + banner.goodsId;
            }
          },
          // 商品类别点击
          handleCategoryClick(categoryId) {
            this.selectedCategoryId = categoryId;
            this.$message.info("筛选类别功能开发中...");
            // 这里可以筛选商品
          },
          // 商品点击
          handleGoodsClick(goods) {
            // 跳转到商品详情页，传递商品ID
            window.location.href = "/page/goods-detail?id=" + goods.id;
          },
          // 获取商品图片
          getGoodsImage(goodsImg) {
            if (!goodsImg) {
              return "https://via.placeholder.com/100x100?text=No+Image";
            }
            // 如果有多张图片，取第一张
            const images = goodsImg.split(",");
            return images[0].trim();
          },
          // 格式化时间
          formatTime(timeStr) {
            if (!timeStr) return "";
            const date = new Date(timeStr);
            const month = (date.getMonth() + 1).toString().padStart(2, "0");
            const day = date.getDate().toString().padStart(2, "0");
            const hours = date.getHours().toString().padStart(2, "0");
            const minutes = date.getMinutes().toString().padStart(2, "0");
            return month + "-" + day + " " + hours + ":" + minutes;
          },
          // 获取商品状态文本
          getGoodsStatusText(status) {
            const statusMap = {
              0: "未开始",
              1: "竞拍中",
              2: "已成交",
              3: "已流拍",
            };
            return statusMap[status] || "未知";
          },
          // 获取商品状态样式类
          getGoodsStatusClass(status) {
            const classMap = {
              0: "goods-status-upcoming",
              1: "goods-status-auctioning",
              2: "goods-status-ended",
              3: "goods-status-ended",
            };
            return classMap[status] || "";
          },
        },
      });
    </script>
  </body>
</html>
